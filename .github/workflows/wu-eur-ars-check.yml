# Appelle l’API déployée sur Vercel toutes les 5 minutes.
# L’e-mail (si taux > seuil) est envoyé par l’API via Resend — ce workflow ne fait qu’un GET authentifié.

name: Western Union EUR/ARS check

on:
  schedule:
    # Toutes les 5 minutes (heure UTC). GitHub peut décaler légèrement l’exécution.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wu-rate-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # Utilise les secrets / variables de l’environnement GitHub « production »
    # (Settings → Environments → production).
    environment: production
    steps:
      - name: GET /api/check-rate
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CHECK_RATE_URL: ${{ vars.CHECK_RATE_URL }}
          # Optionnel : si « Deployment Protection » est activé sur Vercel (page « Authentication Required »),
          # crée un Protection Bypass Secret sur Vercel et le même secret ici (nom : VERCEL_PROTECTION_BYPASS).
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          set -euo pipefail
          if [ -z "${CHECK_RATE_URL:-}" ]; then
            echo "::error::Ajoute la variable CHECK_RATE_URL dans l’environnement « production » (ou au niveau repo)"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Ajoute le secret CRON_SECRET (identique à celui de Vercel)"
            exit 1
          fi
          BASE="${CHECK_RATE_URL%/}"
          TARGET="${BASE}/api/check-rate"
          # Bypass conforme à https://vercel.com/docs/deployment-protection/methods-to-bypass-deployment-protection/protection-bypass-automation
          if [ -n "${VERCEL_PROTECTION_BYPASS:-}" ]; then
            QUERY="$(python3 -c "import os,urllib.parse as u; t=os.environ.get('VERCEL_PROTECTION_BYPASS',''); print('x-vercel-set-bypass-cookie=true&x-vercel-protection-bypass='+u.quote(t,safe=''))")"
            TARGET="${TARGET}?${QUERY}"
            echo "Protection Vercel : bypass activé (secret VERCEL_PROTECTION_BYPASS)"
          else
            echo "::notice::Sans secret VERCEL_PROTECTION_BYPASS : la prod doit être accessible sans auth Vercel (voir README)."
          fi
          echo "GET ${BASE}/api/check-rate"
          HTTP_CODE=$(curl -sS -g -o resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${TARGET}")
          echo "HTTP ${HTTP_CODE}"
          cat resp.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            if [ "$HTTP_CODE" = "401" ] && grep -q "Authentication Required" resp.json 2>/dev/null; then
              echo "::error::Vercel bloque encore l’accès (page « Authentication Required »). Soit tu désactives la protection sur le déploiement Production (Vercel → Projet → Settings → Deployment Protection), soit tu crées un « Protection Bypass » sur Vercel et tu ajoutes le même token en secret GitHub VERCEL_PROTECTION_BYPASS."
            fi
            exit 1
          fi
